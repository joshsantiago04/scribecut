name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-22.04

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python backend ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps & bundle backend
        working-directory: backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller server.spec

      # ── Node + Rust ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - uses: dtolnay/rust-toolchain@stable

      # ── Linux system deps ───────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libwayland-dev

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Tauri app
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            CONFIG='{"bundle":{"resources":{"../backend/dist/server.exe":"backend/server.exe"}}}'
          else
            CONFIG='{"bundle":{"resources":{"../backend/dist/server":"backend/server"}}}'
          fi
          npm run tauri:build -- --config "$CONFIG"

      # ── Upload to GitHub release ────────────────────────────────────────────
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Clip Findr ${{ github.ref_name }}"
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
