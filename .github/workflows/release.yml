name: Build & Release

# Triggers when you push a version tag, e.g. git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-22.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python backend ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies & PyInstaller
        working-directory: backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller server.spec

      # ── Write platform-specific Tauri resource config ───────────────────────
      - name: Write Tauri resource config
        shell: python
        run: |
          import json, os
          is_win = os.environ.get("RUNNER_OS") == "Windows"
          src = "backend/dist/server.exe" if is_win else "backend/dist/server"
          dst = "backend/server.exe" if is_win else "backend/server"
          cfg = {"bundle": {"resources": {src: dst}}}
          with open("src-tauri/tauri.resources.json", "w") as f:
              json.dump(cfg, f)

      # ── Tauri app ───────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwayland-dev

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clip Findr v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.resources.json
